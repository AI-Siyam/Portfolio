<!DOCTYPE html>
<html>

<head>

    <title>Portfolio</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }


        body {

            background: #021542;

            color: white;

            height: 100vh;

            overflow: hidden;

            font-family: Georgia;

        }



        /* HEADER */

        header {

            background: #063a3d;

            padding: 18px 70px;

        }


        nav {

            display: flex;

            justify-content: space-between;

            align-items: center;

        }


        .logo {

            font-size: 34px;

            font-weight: bold;

        }


        .menu a {

            color: white;

            text-decoration: none;

            margin-left: 45px;

            font-size: 18px;

        }



        .model {

            display: flex;

            justify-content: space-between;

            align-items: flex-end;

            height: calc(112vh - 180px);

            padding: 0px 40px 0;

        }



        /* LEFT */

        .left {

            width: 52%;

            display: flex;

            flex-direction: column;

            justify-content: flex-start;

            padding-top: 60px;

        }


        .left h2 {

            font-size: 60px;

            margin-bottom: 40px;

        }


        .left h1 {

            font-size: 50px;

            color: #36c6ff;

            margin-bottom: 50px;

        }


        .left ul {

            font-size: 30px;

            margin-left: 70px;

            line-height: 2;

        }


        .cv {

            margin-top: 35px;

            margin-left: 100px;

        }


        .cv button {
            display: inline-block;
            padding: 12px 28px;
            font-size: 18px;
            font-weight: 500;
            text-decoration: none;
            color: white;

            background: linear-gradient(135deg, #d9eff8, #8866f8);
            border-radius: 50px;
            /* this makes it oval/pill shape */

            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }



        /* SOCIAL */

        .social {

            margin-top: 120px;

            display: flex;

            gap: 50px;

        }


        .social a {

            color: white;

            text-decoration: none;

            font-size: 20px;

        }

        .social img {
            width: 35px;
            height: 35px;
            transition: 0.3s;
            cursor: pointer;
        }

        .social img:hover {
            transform: scale(1.2);
        }



        /* IMAGE */

        .right {

            width: 50%;

            height: 100%;

            display: flex;

            align-items: flex-end;

            justify-content: center;

        }


        .right img {

            height: 95%;

            object-fit: contain;

            display: block;

        }

        .footer {
            text-align: center;
            margin-top: 40px;
            padding: 20px;
            font-size: 16px;
            color: #b0c4ff;
        }
    </style>

</head>



<body>



    <header>

        <nav>

            <div class="logo">

                PORTFOLIO

            </div>



            <div class="menu">

                <a href="#">home</a>

                <a href="#">about</a>

                <a href="#">skill</a>

                <a href="#">project</a>

                <a href="#">contact</a>

            </div>

        </nav>

    </header>




    <section class="model">



        <div class="left">

            <h2>HELLO, I AM</h2>

            <h1>AMINUL ISLAM SIYAM</h1>


            <ul>

                <li>A Computer Science Student</li>

                <li>Web Developer</li>

                <li>Graphics Designer</li>

            </ul>


            <div class="cv">

                <button>
                    <a href="cv.pdf" target="_blank" class="cv-btn">
                        Download CV
                    </a>
                </button>

            </div>



            <div class="social">

                <a href="https://www.linkedin.com/in/aminul-islam-siyam-b69b80390/" target="_blank">
                    <img src="https://cdn-icons-png.flaticon.com/512/174/174857.png" alt="LinkedIn">
                </a>

                <a href="https://github.com/AI-Siyam" target="_blank">
                    <img src="https://cdn-icons-png.flaticon.com/512/25/25231.png" alt="GitHub">
                </a>

                <a href="https://www.facebook.com/aminul.islam.siyam.2024" target="_blank">
                    <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png" alt="Facebook">
                </a>

                <a href="https://x.com/Siyam_141" target="_blank">
                    <img src="https://cdn-icons-png.flaticon.com/512/733/733579.png" alt="X">
                </a>

            </div>


        </div>





        <div class="right">

            <img src="Untitled design.png" alt="profile">

        </div>



    </section>

    <footer class="footer">
        © 2026 Aminul Islam Siyam. All Rights Reserved.
    </footer>

</body>

</html>
